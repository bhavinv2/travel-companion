steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/connecting-desis:$COMMIT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/connecting-desis:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'connecting-desis'
      - '--image=gcr.io/$PROJECT_ID/connecting-desis:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances=$PROJECT_ID:us-central1:connecting-desis-db'
      - '--set-secrets=FLASK_SECRET_KEY=flask-secret-key:latest,DATABASE_URL=database-url:latest,MAIL_PASSWORD=mail-password:latest'

images:
  - 'gcr.io/$PROJECT_ID/connecting-desis:$COMMIT_SHA'
